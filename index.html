<!DOCTYPE html>
<html>
<head>
    <title>MirrorPay</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #0f121c;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .app {
            max-width: 500px;
            width: 100%;
            background: #0f121c;
            border-radius: 48px;
            padding: 24px;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #2469F0;
            text-align: center;
            margin-bottom: 20px;
        }
        .balance {
            background: #131a28;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 18px;
        }
        .balance h3 {
            color: #8f9bb3;
            font-size: 13px;
            margin-bottom: 8px;
        }
        .balance h1 {
            font-size: 38px;
            color: white;
            margin: 0;
        }
        .btn {
            background: #2469F0;
            border: none;
            padding: 14px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #2a3349;
        }
        input {
            background: #111621;
            border: 1px solid #262f45;
            padding: 14px;
            border-radius: 40px;
            width: 100%;
            margin-bottom: 12px;
            color: white;
            box-sizing: border-box;
        }
        .small {
            font-size: 11px;
            color: #6c7a9e;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="logo">💰 MirrorPay</div>

    <div class="balance">
        <h3>Demo Money (simulation)</h3>
        <h1>$1,000,000.00</h1>
    </div>

    <div class="balance" style="border:1px solid #2469F0;">
        <h3>💰 REAL Spendable Balance</h3>
        <h1>$0.00</h1>
    </div>

    <div style="margin: 20px 0;">
        <input type="email" placeholder="Email" value="demo@test.com">
        <input type="password" placeholder="Password" value="123456">
    </div>

    <button class="btn">Sign In</button>
    <button class="btn btn-outline">Create Account (free $1,000,000)</button>

    <div class="small">
        ⚡ Recipient pays $15 USDT to unlock real money<br>
        🔑 Bybit API Connected
    </div>
</div>
</body>
</html>

    };
    const UNLOCK_FEE = 15;

    const CRYPTO_CONFIG = {
        BTC: { symbol: '₿', name: 'Bitcoin', decimal: 8, price: 85000 },
        ETH: { symbol: 'Ξ', name: 'Ethereum', decimal: 18, price: 3200 },

    };
    const CRYPTO_LIST = Object.keys(CRYPTO_CONFIG);

    let appData = { users: {}, currentUser: null };
    let selectedCrypto = 'USDT';

    function loadData() {
        const saved = localStorage.getItem('mirrorpay_crypto');
        if (saved) {
            try { const parsed = JSON.parse(saved); appData.users = parsed.users || {}; appData.currentUser = parsed.currentUser || null; } catch(e) {}
        }
    }
    function saveData() { localStorage.setItem('mirrorpay_crypto', JSON.stringify({ users: appData.users, currentUser: appData.currentUser })); }

    function getCurrentUserData() {
        if (!appData.currentUser || !appData.users[appData.currentUser]) return null;
        return appData.users[appData.currentUser];
    }

    function updateCurrentUser(data) {
        if (!appData.currentUser) return;
        appData.users[appData.currentUser] = { ...appData.users[appData.currentUser], ...data };
        saveData();
    }

    function showToast(msg, isErr = false) {
        const existing = document.querySelector('.toast-notification');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.style.borderLeftColor = isErr ? '#e5484d' : '#2469F0';
        toast.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => { if (toast.parentNode) toast.remove(); }, 4000);
    }

    function getDisplayName(email) {
        const user = appData.users[email];
        if (user && user.displayName && user.displayName.trim() !== '') return user.displayName.trim();
        return email.split('@')[0];
    }

    function getCoinPrice(coin) { return CRYPTO_CONFIG[coin]?.price || 0; }
    function getCoinDecimal(coin) { return CRYPTO_CONFIG[coin]?.decimal || 8; }

    function login() {
        const email = document.getElementById('loginEmail')?.value.trim();
        const password = document.getElementById('loginPassword')?.value.trim();
        if (!email || !password) { showToast('Enter email & password', true); return; }
        const user = appData.users[email];
        if (!user) { showToast('Account not found. Sign up first.', true); return; }
        if (user.password !== password) { showToast('Incorrect password', true); return; }
        appData.currentUser = email;
        saveData();
        renderUI();
        showToast(`Welcome ${getDisplayName(email)}!`);
    }

    function signup() {
        const email = document.getElementById('loginEmail')?.value.trim();
        const password = document.getElementById('loginPassword')?.value.trim();
        if (!email || !password) { showToast('Enter email & password', true); return; }
        if (password.length < 6) { showToast('Password min 6 chars', true); return; }
        if (appData.users[email]) { showToast('Account already exists', true); return; }
        appData.users[email] = {
            password: password,
            displayName: '',
            demoBalance: 1000000,
            realBalance: 0,
            frozenTransactions: [],
            activityFeed: [{ text: '🎉 Welcome! You have $1,000,000 demo money.', time: new Date().toLocaleTimeString() }]
        };
        appData.currentUser = email;
        saveData();
        renderUI();
        showToast('✅ Account created! $1,000,000 demo money.');
    }

    function logout() { appData.currentUser = null; saveData(); renderUI(); showToast('Logged out'); }

    function sendDemo() {
        const sender = getCurrentUserData();
        if (!sender) { showToast('Please log in', true); return; }
        const recipientEmail = document.getElementById('recipientEmail')?.value.trim();
        const amount = parseFloat(document.getElementById('sendAmount')?.value);
        if (!recipientEmail) { showToast('Enter recipient email', true); return; }
        if (isNaN(amount) || amount <= 0) { showToast('Enter valid amount', true); return; }
        if (amount > sender.demoBalance) { showToast(`Insufficient demo balance: $${sender.demoBalance}`, true); return; }
        if (recipientEmail === appData.currentUser) { showToast('Cannot send to yourself', true); return; }
        const recipient = appData.users[recipientEmail];
        if (!recipient) { showToast('Recipient not found', true); return; }

        sender.demoBalance -= amount;
        const price = getCoinPrice(selectedCrypto);
        const decimal = getCoinDecimal(selectedCrypto);
        const cryptoAmount = amount / price;
        const formattedCrypto = cryptoAmount.toFixed(decimal);
        const senderName = getDisplayName(appData.currentUser);
        const frozenTx = {
            id: Date.now() + '-' + Math.random().toString(36).substring(2, 8),
            fromEmail: appData.currentUser,
            fromName: senderName,
            amount: amount,
            crypto: selectedCrypto,
            cryptoAmount: parseFloat(formattedCrypto),
            price: price,
            unlocked: false,
            unlockFee: UNLOCK_FEE,
            createdAt: new Date().toISOString()
        };
        recipient.frozenTransactions = [frozenTx, ...(recipient.frozenTransactions || [])];
        saveData();
        renderUI();
        showToast(`✅ $${amount} (${formattedCrypto} ${selectedCrypto}) demo sent! Recipient pays $${UNLOCK_FEE} to unlock.`);
    }

    function unlockFrozen(frozenId) {
        const user = getCurrentUserData();
        if (!user) return;
        const idx = (user.frozenTransactions || []).findIndex(f => f.id === frozenId);
        if (idx === -1) { showToast('Transaction not found', true); return; }
        const frozen = user.frozenTransactions[idx];
        if (frozen.unlocked) { showToast('Already unlocked', true); return; }

        const confirmUnlock = confirm(
            `💸 UNLOCK $${frozen.amount.toFixed(2)} → REAL BALANCE\n\n` +
            `From: ${frozen.fromName}\n` +

            `✅ After payment, $${frozen.amount.toFixed(2)} added to your REAL balance.`

        if (!confirmUnlock) return;

        frozen.unlocked = true;
        user.frozenTransactions[idx] = frozen;
        user.realBalance = (user.realBalance || 0) + frozen.amount;
        saveData();
        renderUI();
        showToast(`✅ $${frozen.amount.toFixed(2)} converted to REAL money!`);
    }

        user.realBalance = 0;
        saveData();
